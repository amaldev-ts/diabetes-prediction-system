<!DOCTYPE html>
<html>
<head>

<title>Report</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet"
>

</head>

<body class="bg-light">

<div class="bg-dark text-white p-3 text-center">

<h3>Diabetes Report</h3>

</div>

<div class="container mt-4">

<div class="card p-4">

<table class="table">

<tr>
<th>Name</th>
<td>{{name}}</td>
</tr>

<tr>
<th>BMI</th>
<td>{{bmi}}</td>
</tr>

<tr>
<th>Result</th>
<td>
{% if result == "Diabetic" %}
<span class="text-danger">{{result}}</span>
{% else %}
<span class="text-success">{{result}}</span>
{% endif %}
</td>
</tr>

<tr>
<th>Diabetic Probability</th>
<td>{{dprob}} %</td>
</tr>

<tr>
<th>Normal Probability</th>
<td>{{nprob}} %</td>
</tr>

</table>


<button class="btn btn-primary"
onclick="window.print()">
Print Report
</button>


<a href="/" class="btn btn-success">
New Test
</a>


</div>

</div>

</body>
</html>
